$nsuri: http://www.eclipse.org/emf/2002/Ecore
package:
  - name: p1
    t1: {}
  - name: p2
    t2: {}
  - name: p3
    t3:
      n: 5
      abstract: true
  - name: p4
    t3:
      n: 5
      abstract: true
:template:
  - name: t1
    content:
      language: EOL
      script: |
        for (i in 1.to(10)){
          new t_class(a_name = "C" + i);
        }
  - name: t2
    content:
      language: EOL
      script: new t_class(a_name = "C11");
  - name: t3
    parameter:
      name: n
    content:
      language: EOL
      script: |
        for (i in 1.to(n.asInteger())){
          new t_class(a_name = "C" + i);
        }