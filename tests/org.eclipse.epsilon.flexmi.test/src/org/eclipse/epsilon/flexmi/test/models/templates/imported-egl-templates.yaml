- $type: :template
  name: t1
  content:
    language: EGL
    script: |-
        [%for (i in 1.to(10)){%]
        - $type: class
          name: C[%=i%]
        [%}%]

- $type: :template
  name: t2
  content:
    language: EGL
    script: |-
        - $type: class
          name: C[%=11%]

- $type: :template
  name: t3
  parameter:
    name: n
  content:
    language: EGL
    script: |-
       [%for (i in 1.to(n.asInteger())){%]
       - $type: class
         name: C[%=i%]
       [%}%]